name: Build Windows Executable

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 with required toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          release: false
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain

      - name: Build
        shell: msys2 {0}
        run: |
          pacman -Sy --noconfirm make || true
          mkdir -p bin
          mingw32-make clean || true
          mingw32-make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MythwareToolkit-exe
          path: bin/MythwareToolkit.exe
